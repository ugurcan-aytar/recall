name: Validate embed_llama

# Manual-only workflow that proves pre-built binaries CAN be built
# with the local GGUF embedding backend compiled in (vanilla
# godeps/gollama v0.1.8, no fork). If this stays green across both
# runners we know release.yml can adopt the same build flow for
# v0.2.1 without needing a patched gollama fork.
#
# Runs on workflow_dispatch only — NOT on push / tag — so it never
# touches the Homebrew tap or the public release assets. The
# produced binary is uploaded as an actions artifact; the caller
# downloads it and smoke-tests with a real GGUF model on their own
# machine.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux_amd64
            build_type: ""
          - os: macos-latest
            label: darwin_arm64
            build_type: metal
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout recall
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Clone vanilla gollama and build the C++ static library. This
      # is the canonical recipe from the gollama README — no
      # replace directive, just LIBRARY_PATH pointing at the cloned
      # tree so CGo's linker finds libbinding.a.
      - name: Clone gollama + submodules
        run: |
          set -euxo pipefail
          git clone --recurse-submodules --branch v0.1.8 \
            https://github.com/godeps/gollama third_party/gollama

      - name: Build libbinding.a (Linux CPU)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euxo pipefail
          cd third_party/gollama
          make libbinding.a
          ls -la libbinding.a

      - name: Build libbinding.a (macOS Metal)
        if: matrix.os == 'macos-latest'
        run: |
          set -euxo pipefail
          cd third_party/gollama
          BUILD_TYPE=metal make libbinding.a
          ls -la libbinding.a

      - name: Build recall with embed_llama (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          CGO_ENABLED: "1"
          LIBRARY_PATH: ${{ github.workspace }}/third_party/gollama
          C_INCLUDE_PATH: ${{ github.workspace }}/third_party/gollama
          LD_LIBRARY_PATH: ${{ github.workspace }}/third_party/gollama
        run: |
          set -euxo pipefail
          go build -tags 'sqlite_fts5 embed_llama' \
            -ldflags "-s -w" \
            -o recall-embed-llama ./cmd/recall
          ls -la recall-embed-llama
          file recall-embed-llama

      - name: Build recall with embed_llama (macOS)
        if: matrix.os == 'macos-latest'
        env:
          CGO_ENABLED: "1"
          LIBRARY_PATH: ${{ github.workspace }}/third_party/gollama
          C_INCLUDE_PATH: ${{ github.workspace }}/third_party/gollama
          LD_LIBRARY_PATH: ${{ github.workspace }}/third_party/gollama
          CGO_LDFLAGS: "-framework Foundation -framework Metal -framework MetalKit -framework MetalPerformanceShaders"
        run: |
          set -euxo pipefail
          go build -tags 'sqlite_fts5 embed_llama' \
            -ldflags "-s -w" \
            -o recall-embed-llama ./cmd/recall
          ls -la recall-embed-llama
          file recall-embed-llama

      # Smoke: doctor should NOT print the "local GGUF not compiled in"
      # warning. The warning is emitted by the stub (default build)
      # when LocalEmbedderAvailable() returns false; a real
      # embed_llama build returns true and reaches a different
      # branch ("embedding model missing — run recall models
      # download").
      - name: Smoke — embed_llama baked in
        env:
          RECALL_DB_PATH: ${{ runner.temp }}/recall-smoke/index.db
          RECALL_MODELS_DIR: ${{ runner.temp }}/recall-smoke/models
        run: |
          set -euxo pipefail
          mkdir -p "${{ runner.temp }}/recall-smoke/models"
          out="$(./recall-embed-llama doctor 2>&1 || true)"
          echo "$out"
          if echo "$out" | grep -q "local GGUF not compiled in"; then
            echo "::error::embed_llama tag didn't take effect — doctor still reports stub"
            exit 1
          fi
          # Positive signal: doctor reached the model-path branch.
          if ! echo "$out" | grep -qE "embedding model.*(missing|gguf)"; then
            echo "::error::doctor output didn't mention embedding model path"
            exit 1
          fi
          echo "OK: embed_llama tag in effect, stub path not reached"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: recall-embed-llama-${{ matrix.label }}
          path: recall-embed-llama
          if-no-files-found: error
          retention-days: 7
